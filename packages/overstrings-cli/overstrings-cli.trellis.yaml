schema_version: "0.2"
name: overstrings-cli
version: 0.1.0
description: String formatting and normalization utility CLI for Trellis examples.
homepage: https://example.org/overstrings-cli
kind: binary
source:
  type: local_dir
  path: payload
install:
  strategy: copy
  entries:
    - bin
bin:
  overstrings: bin/overstrings
dependencies:
  - vineyard-core
provenance:
  publisher: Overstrings Collective
  license: Apache-2.0
  registry: vineyard-core
platform:
  os: [linux, macos]
  arch: [x86_64, aarch64]
health:
  notes: Demonstrates dependency declaration without automatic resolution.
